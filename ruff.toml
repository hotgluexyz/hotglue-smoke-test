target-version = "py310"
line-length = 100

exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    ".secrets",
    ".vscode"
]

[lint]
extend-select = ["C901"]

[lint.per-file-ignores]
#due to faker replace matrix
"src/hotglue_smoke_test/vcr/sanitize.py" = ["C901"]

[lint.mccabe]
max-complexity = 15
