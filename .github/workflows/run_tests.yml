name: Run tests

on:
  pull_request:
    branches: [main, master]

jobs:
  tox-py:
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: 1

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.31"
          enable-cache: true

      - name: Install tox
        run: uv pip install tox

      - name: Run tox -e py
        run: tox -e py
