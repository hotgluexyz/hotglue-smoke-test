name: Run tests

on:
  pull_request:
    branches: [main, master]

jobs:
  tox-py:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tox
        run: pip install tox

      - name: Run tox -e py
        run: tox -e py
